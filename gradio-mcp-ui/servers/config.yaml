# MCP Server Configuration
# This file defines the MCP servers available to the Gradio UI

mcpServers:
  # Original example server
  example:
    command: python
    args: ["./servers/example_server.py"]
    env:
      PYTHONPATH: "."
    description: "Original Python example server with basic tools (add, multiply, dice, time, echo)"
    category: "example"
    specialties: ["math", "dice", "time", "text", "basic"]
  
  # NewsServer - Primary General Purpose Server
  NewsServer:
    url: http://localhost:3000/api/v1
    transport: http
    description: "NewsServer - Primary general purpose server with OpenAI integration for complex AI tasks and news analysis"
    category: "production"
    capabilities: ["chat", "tools", "resources", "prompts"]
    specialties: ["general", "math", "utility", "openai", "ai", "creative", "analysis", "news"]
  
  # MilitaryServer - Military & Defense Specialized Server  
  MilitaryServer:
    url: http://localhost:3001/api/v1
    transport: http
    description: "MilitaryServer - Military and defense specialization with combat simulation and weapon analysis"
    category: "specialized"
    capabilities: ["chat", "tools", "resources", "prompts"]
    specialties: ["military", "defense", "combat", "weapons", "tactics", "security", "simulation"]
  
  # GovernmentServer - Civil Government Specialized Server
  GovernmentServer:
    url: http://localhost:3002/api/v1
    transport: http
    description: "GovernmentServer - Civil government specialization with policy analysis and public services"
    category: "specialized"
    capabilities: ["chat", "tools", "resources", "prompts"]
    specialties: ["government", "policy", "public", "regulation", "civic", "administration", "services"]